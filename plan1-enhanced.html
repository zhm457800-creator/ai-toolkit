<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Toolkit - Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#1A1A1B;--bg-edit:#1e1e1f;--surface:rgba(40,38,37,0.65);--surface-h:rgba(50,48,47,0.75);
    --card:rgba(42,40,39,0.55);--card-h:rgba(55,52,50,0.65);
    --t1:#F4F1ED;--t2:#a8a4a0;--t3:#706c68;
    --accent:#d4a5a5;--accent-dim:rgba(212,165,165,0.12);--accent-glow:rgba(212,165,165,0.25);
    --green:#22c55e;--gold:#f0c060;--blue:#6ea8fe;
    --border:rgba(244,241,237,0.08);--border-h:rgba(212,165,165,0.35);
    --danger:#ef4444;
  }
  body{background:var(--bg);color:var(--t1);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .4s}
  body.edit-active{background:var(--bg-edit)}

  /* ===== 星空 ===== */
  #starfield{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);animation:twinkle var(--dur) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}

  /* ===== 超新星彩蛋 ===== */
  #supernova{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;opacity:0;transition:opacity .1s}
  #supernova.boom{opacity:1}
  .nova-particle{position:absolute;border-radius:50%;animation:novaFly 1.5s ease-out forwards}
  @keyframes novaFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
  .nova-quote{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--accent);text-align:center;max-width:600px;line-height:1.8;opacity:0;transition:opacity .5s;pointer-events:none;text-shadow:0 0 30px rgba(212,165,165,0.5)}
  .nova-quote.show{opacity:1}

  /* ===== 编辑模式横幅（增强版） ===== */
  #editBanner{position:fixed;top:0;left:0;right:0;z-index:300;height:44px;background:rgba(212,165,165,0.08);border-bottom:1px solid var(--accent);display:flex;align-items:center;justify-content:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--accent);transform:translateY(-100%);transition:transform .3s ease;backdrop-filter:blur(20px) saturate(1.2)}
  #editBanner.active{transform:translateY(0)}
  #editBanner .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #editBanner .exit-btn{margin-left:20px;padding:4px 14px;border:1px solid var(--accent);border-radius:4px;background:transparent;color:var(--accent);font-family:inherit;font-size:10px;cursor:pointer;letter-spacing:1px;transition:background .2s}
  #editBanner .exit-btn:hover{background:var(--accent-dim)}

  /* ===== 导航 ===== */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:var(--surface);backdrop-filter:blur(24px) saturate(1.3);border-bottom:1px solid var(--border);transition:top .3s,background .4s}
  nav.shifted{top:44px}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;user-select:none}
  .logo-badge{width:36px;height:36px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);transition:transform .3s}
  .logo-badge.shake{animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
  .logo-text{font-size:16px;font-weight:700;letter-spacing:2px;color:var(--t1);text-transform:uppercase}
  .nav-right{display:flex;align-items:center;gap:12px}
  .nav-links{display:flex;gap:32px;list-style:none}
  .nav-links a{font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t2);text-decoration:none;transition:color .3s;position:relative}
  .nav-links a:hover{color:var(--t1)}
  .nav-links a.active{color:var(--t1)}
  .nav-links a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--accent)}
  .nav-icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .3s;position:relative}
  .nav-icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .nav-icon-btn.lock-active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

  /* ===== 主内容 ===== */
  main{position:relative;z-index:1;padding:120px 48px 80px;max-width:1400px;margin:0 auto;transition:padding-top .3s}
  body.edit-active main{padding-top:148px}
  .hero{display:flex;align-items:flex-start;justify-content:space-between;gap:40px;margin-bottom:40px}
  .hero-content{flex:1;max-width:650px}
  .section-number{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t3);letter-spacing:2px;margin-bottom:12px}
  .hero h1{font-size:clamp(32px,5vw,60px);font-weight:800;text-transform:uppercase;letter-spacing:-0.03em;line-height:1.1;margin-bottom:16px}
  .hero h1 .accent{color:var(--accent);font-style:italic}
  .hero p{font-size:15px;color:var(--t2);max-width:600px;line-height:1.7}
  /* hero 右侧快速添加入口 */
  .hero-aside{flex-shrink:0;width:200px;display:flex;flex-direction:column;gap:16px}
  .quick-add{padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .3s;text-align:center}
  .quick-add:hover{border-color:var(--accent);background:var(--accent-dim);transform:translateY(-2px)}
  .quick-add .qa-icon{font-size:28px;margin-bottom:8px}
  .quick-add .qa-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--t1);text-transform:uppercase;margin-bottom:4px}
  .quick-add .qa-desc{font-size:11px;color:var(--t3);line-height:1.4}
  .quick-add.unlocked{border-color:var(--accent);background:var(--accent-dim)}
  .quick-add.unlocked .qa-desc{color:var(--accent)}
  /* 统计卡片 */
  .stats-card{padding:16px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:12px}
  .stats-card .sc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
  .stats-card .sc-row:last-child{border:none}
  .stats-card .sc-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
  .stats-card .sc-val{font-size:14px;font-weight:600;color:var(--t1)}
  .stats-card .sc-val.accent{color:var(--accent)}
  
  /* ===== 弹出式添加卡片 ===== */
  .add-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(8px)}
  .add-modal.active{opacity:1;pointer-events:all}
  .add-card{width:420px;max-width:90vw;background:var(--surface);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(24px) saturate(1.2);transform:scale(.95) translateY(20px);transition:transform .3s ease;overflow:hidden}
  .add-modal.active .add-card{transform:scale(1) translateY(0)}
  .add-card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .add-card-header h3{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t1)}
  .add-card-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .add-card-close:hover{border-color:var(--accent);color:var(--accent)}
  .add-card-body{padding:24px}
  .add-input-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;transition:all .3s;cursor:pointer}
  .add-input-zone:hover,.add-input-zone.drag-over{border-color:var(--accent);background:var(--accent-dim)}
  .add-input-zone .ai-icon{font-size:32px;margin-bottom:12px;color:var(--t3)}
  .add-input-zone .ai-text{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t2);margin-bottom:8px}
  .add-input-zone .ai-hint{font-size:11px;color:var(--t3)}
  .add-input-zone input{width:100%;margin-top:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;text-align:center}
  .add-input-zone input:focus{border-color:var(--accent)}
  .add-preview{margin-top:20px;padding:16px;background:var(--surface);border-radius:12px;border:1px solid var(--border)}
  .add-preview-header{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
  .add-preview-content{display:flex;align-items:center;gap:14px}
  .add-preview-icon{width:48px;height:48px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
  .add-preview-icon img{width:28px;height:28px;object-fit:contain}
  .add-preview-info{flex:1}
  .add-preview-name{font-size:15px;font-weight:600;margin-bottom:4px}
  .add-preview-url{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);word-break:break-all}
  .add-preview-tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .add-card-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end}
  .add-card-footer button{padding:10px 20px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .add-btn-cancel{border:1px solid var(--border);background:transparent;color:var(--t2)}
  .add-btn-cancel:hover{border-color:var(--t2);color:var(--t1)}
  .add-btn-confirm{border:1px solid var(--accent);background:transparent;color:var(--accent)}
  .add-btn-confirm:hover{background:var(--accent-dim)}
  .add-btn-confirm:disabled{opacity:.4;cursor:not-allowed}

  /* ===== 工具栏 ===== */
  .toolbar{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2)}
  .search-box{flex:1;min-width:260px;position:relative}
  .search-box input{width:100%;padding:12px 16px 12px 44px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .3s}
  .search-box input::placeholder{color:var(--t3)}
  .search-box input:focus{border-color:var(--accent)}
  .search-box .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px}
  .toolbar-actions{display:flex;gap:8px}
  .tb-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .3s;text-transform:uppercase;white-space:nowrap}
  .tb-btn:hover{border-color:var(--accent);color:var(--accent)}
  .tb-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

  /* ===== 筛选 ===== */
  .filter-bar{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2)}
  .pill{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .3s;white-space:nowrap}
  .pill:hover{border-color:var(--accent);color:var(--accent)}
  .pill.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

  /* ===== 对比栏 ===== */
  #compareBar{position:fixed;bottom:-80px;left:50%;transform:translateX(-50%);z-index:150;display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--surface);border:1px solid var(--border-h);border-radius:12px;backdrop-filter:blur(20px) saturate(1.2);transition:bottom .4s ease;white-space:nowrap}
  #compareBar.active{bottom:24px}
  #compareBar .cb-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);letter-spacing:1px}
  #compareBar .cb-items{display:flex;gap:6px;align-items:center}
  #compareBar .cb-chip{padding:4px 10px;border-radius:4px;background:var(--accent-dim);font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px}
  #compareBar .cb-chip .remove{cursor:pointer;opacity:.6;transition:opacity .2s}
  #compareBar .cb-chip .remove:hover{opacity:1}
  #compareBar .cb-compare{padding:8px 20px;border:1px solid var(--accent);border-radius:6px;background:transparent;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s}
  #compareBar .cb-compare:hover{background:var(--accent-dim)}
  #compareBar .cb-clear{padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--t3);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s}

  /* ===== 卡片网格 ===== */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;cursor:pointer;transition:transform .4s,box-shadow .4s,border-color .4s,border-style .3s;position:relative;overflow:hidden;transform-style:preserve-3d;perspective:800px;backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);box-shadow:inset 0 1px 0 0 rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.08)}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .4s}
  .card:hover{border-color:var(--border-h);box-shadow:0 8px 32px rgba(0,0,0,0.15)}
  .card:hover::before{opacity:1}
  /* 编辑模式卡片样式 */
  body.edit-active .card{border-style:dashed;border-color:rgba(212,165,165,0.15)}
  body.edit-active .card:hover{border-style:solid;border-color:var(--border-h)}
  body.edit-active .card .edit-hint{display:flex}
  .card .edit-hint{display:none;position:absolute;top:10px;right:10px;font-size:12px;opacity:.5;pointer-events:none}
  .card.favorited{border-color:rgba(240,192,96,0.3) !important;border-style:solid !important}
  .card.favorited::after{content:'★';position:absolute;top:12px;right:12px;color:var(--gold);font-size:14px;z-index:2}
  .card.draft{border-color:var(--t3) !important}
  .card.draft .draft-badge{position:absolute;top:12px;right:12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--t3);background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:3px;z-index:2}
  .card .compare-check{position:absolute;top:12px;left:12px;width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s;z-index:5;opacity:0}
  .card:hover .compare-check{opacity:1}
  .card .compare-check.checked{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);opacity:1}
  .card-icon{width:52px;height:52px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;border:1px solid rgba(212,165,165,0.08);overflow:hidden}
  .card-icon img{width:32px;height:32px;object-fit:contain}
  .card-name{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .card-desc{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;color:var(--accent);background:var(--accent-dim);padding:3px 8px;border-radius:4px;text-transform:uppercase}
  /* 标签编辑器 */
  .tag-editor{margin-top:12px}
  .tag-editor-header{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .tag-editor-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .tag-editor-list .te-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;transition:all .2s;border:1px solid var(--border);color:var(--t2);background:transparent}
  .tag-editor-list .te-tag:hover{border-color:var(--accent);color:var(--accent)}
  .tag-editor-list .te-tag.selected{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .tag-editor-list .te-tag .remove-tag{font-size:10px;opacity:.5;cursor:pointer;margin-left:2px}
  .tag-editor-list .te-tag .remove-tag:hover{opacity:1;color:var(--danger)}
  .tag-editor-input{display:flex;gap:8px}
  .tag-editor-input input{flex:1;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--t1);font-family:'Inter',sans-serif;font-size:12px;outline:none}
  .tag-editor-input input:focus{border-color:var(--accent)}
  .tag-editor-input button{padding:8px 14px;border:1px solid var(--accent);border-radius:6px;background:transparent;color:var(--accent);font-size:11px;cursor:pointer;transition:all .2s}
  .tag-editor-input button:hover{background:var(--accent-dim)}
  /* 最后使用时间 */
  .last-used{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;padding:3px 10px;border-radius:4px;margin-bottom:14px}
  .last-used.today{color:#22c55e;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2)}
  .last-used.recent{color:var(--accent);background:var(--accent-dim);border:1px solid rgba(212,165,165,0.15)}
  .last-used.soon{color:var(--gold);background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.15)}
  .last-used.long-ago{color:var(--t3);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)}
  .last-used.never{color:var(--t3);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);font-style:italic}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
  .stars{display:flex;gap:2px}
  .star-f{color:var(--accent);font-size:13px;cursor:default}
  .star-e{color:var(--t3);font-size:13px;cursor:default}
  .star-edit{cursor:pointer;transition:transform .15s}
  .star-edit:hover{transform:scale(1.3)}
  .card-link{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--t3);text-decoration:none;text-transform:uppercase;transition:color .3s}
  .card:hover .card-link{color:var(--accent)}

  /* ===== 侧滑面板 ===== */
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
  .overlay.active{opacity:1;pointer-events:all}
  .side-panel{position:fixed;top:0;right:-520px;width:520px;max-width:92vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:201;transition:right .4s cubic-bezier(.25,.46,.45,.94);overflow-y:auto;padding:48px 36px;backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2)}
  .side-panel.active{right:0}

// ===== SHA-256 =====
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function createStars() {
  const c = document.getElementById('starfield');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;width:${Math.random()>.7?3:2}px;height:${Math.random()>.7?3:2}px;${Math.random()>.8?'background:rgba(212,165,165,0.3)':''}`;
    c.appendChild(s);
  }
}

// ===== 鼠标引力场 + 3D倾斜 =====
document.addEventListener('mousemove', e => {
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 300) {
      const rotateY = (dx / 300) * 8;
      const rotateX = -(dy / 300) * 8;
      card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-4px)`;
    } else {
      card.style.transform = '';
    }
  });
  const stars = document.querySelectorAll('.star');
  stars.forEach(star => {
    const sx = parseFloat(star.style.left);
    const sy = parseFloat(star.style.top);
    const px = (e.clientX / window.innerWidth) * 100;
    const py = (e.clientY / window.innerHeight) * 100;
    const d = Math.sqrt((sx-px)**2 + (sy-py)**2);
    if (d < 15) {
      const pull = (15 - d) / 15 * 3;
      star.style.transform = `translate(${(px-sx)*pull*0.3}px, ${(py-sy)*pull*0.3}px)`;
    } else {
      star.style.transform = '';
    }
  });
});

// ===== 最后使用时间计算 =====
function getLastUsed(hm) {
  if (!hm || !hm.length) return { text:'NEVER USED', icon:'⊘', cls:'never' };
  // 从末尾倒推，找到最后一个 > 0 的位置
  let daysAgo = 0;
  for (let i = hm.length - 1; i >= 0; i--) {
    if (hm[i] > 0) { daysAgo = hm.length - 1 - i; break; }
    if (i === 0) daysAgo = -1; // 全部为0
  }
  if (daysAgo === -1) return { text:'NEVER USED', icon:'⊘', cls:'never' };
  if (daysAgo === 0) return { text:'TODAY', icon:'●', cls:'today' };
  if (daysAgo === 1) return { text:'YESTERDAY', icon:'◐', cls:'today' };
  if (daysAgo <= 3) return { text:`${daysAgo} DAYS AGO`, icon:'◑', cls:'recent' };
  if (daysAgo <= 7) return { text:`${daysAgo} DAYS AGO`, icon:'○', cls:'soon' };
  if (daysAgo <= 14) return { text:`${Math.floor(daysAgo/7)} WEEKS AGO`, icon:'◌', cls:'long-ago' };
  if (daysAgo <= 30) return { text:`${Math.floor(daysAgo/7)} WEEKS AGO`, icon:'◌', cls:'long-ago' };
  return { text:`${Math.floor(daysAgo/30)} MONTHS AGO`, icon:'○', cls:'long-ago' };
}

// ===== 渲染 =====
function renderStars(r, editable) {
  let h = '';
  for (let i = 1; i <= 5; i++) {
    const cls = i <= r ? 'star-f' : 'star-e';
    const editCls = editable ? 'star-edit' : '';
    h += `<span class="${cls} ${editCls}" ${editable ? `onclick="event.stopPropagation();setRating(${currentPanelId},${i})"` : ''}>★</span>`;
  }
  return h;
}

function getFiltered() {
  return tools.filter(t => {
    if (showFavOnly && !t.fav) return false;
    if (showDraftOnly && !t.draft) return false;
    const filterLabel = TAG_LABELS[currentFilter] || currentFilter;
    const mf = currentFilter === 'all' || t.tags.includes(currentFilter) || t.tags.includes(filterLabel);
    const ms = currentSearch === '' || t.name.toLowerCase().includes(currentSearch) || t.desc.toLowerCase().includes(currentSearch) || t.tags.some(tg => tg.toLowerCase().includes(currentSearch));
    return mf && ms;
  });
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const list = getFiltered();
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🔭</div><p>NO TOOLS FOUND.</p></div>';
    return;
  }
  list.sort((a,b) => (b.fav?1:0) - (a.fav?1:0));
  grid.innerHTML = list.map(t => {
    const lu = getLastUsed(t.heatmap);
    return `
    <div class="card ${t.fav?'favorited':''} ${t.draft?'draft':''}" data-id="${t.id}" ondblclick="event.stopPropagation();toggleFav(${t.id})">
      ${t.draft ? '<div class="draft-badge">DRAFT</div>' : ''}
      <div class="edit-hint">✏️</div>
      <div class="compare-check ${compareList.includes(t.id)?'checked':''}" onclick="event.stopPropagation();toggleCompare(${t.id})">${compareList.includes(t.id)?'✓':''}</div>
      <div class="card-icon">${t.icon.startsWith('http')?`<img src="${t.icon}" onerror="this.parentElement.textContent='${t.name[0]}'">`:t.icon}</div>
      <div class="card-name">${t.name}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-tags">${t.tags.map(tg=>`<span class="tag">${getTagLabel(tg)}</span>`).join('')}</div>
      <div class="last-used ${lu.cls}">${lu.icon} ${lu.text}</div>
      <div class="card-footer">
        <div class="stars">${[1,2,3,4,5].map(i=>`<span class="${i<=t.rating?'star-f':'star-e'}">★</span>`).join('')}</div>
        <a class="card-link" href="${t.url}" target="_blank" onclick="event.stopPropagation()">VISIT →</a>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openPanel(Number(card.dataset.id)));
  });
  updateStats();
}

// ===== 对比 =====
function toggleCompare(id) {
  const idx = compareList.indexOf(id);
  if (idx > -1) compareList.splice(idx, 1);
  else if (compareList.length < 3) compareList.push(id);
  else { showToast('最多对比3个工具','error'); return; }
  updateCompareBar();
  renderCards();
}

function updateCompareBar() {
  const bar = document.getElementById('compareBar');
  const items = document.getElementById('cbItems');
  if (compareList.length === 0) { bar.classList.remove('active'); return; }
  bar.classList.add('active');
  items.innerHTML = compareList.map(id => {
    const t = tools.find(x => x.id === id);
    return `<div class="cb-chip">${t?t.icon:''} ${t?t.name:''} <span class="remove" onclick="event.stopPropagation();toggleCompare(${id})">✕</span></div>`;
  }).join('');
}

function clearCompare() { compareList = []; updateCompareBar(); renderCards(); }

        return `
        <div class="compare-item">
          <div class="ci-icon">${t.icon.startsWith('http')?`<img src="${t.icon}" style="width:32px;height:32px;object-fit:contain" onerror="this.outerHTML='${t.name[0]}'">`:t.icon}</div>
          <div class="ci-name">${t.name}</div>
          <div class="ci-row"><span class="ci-label">网址</span><span class="ci-val"><a href="${t.url}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:11px;word-break:break-all">${t.url}</a></span></div>
          <div class="ci-row"><span class="ci-label">评分</span><span class="ci-val">${'★'.repeat(t.rating)}${'☆'.repeat(5-t.rating)}</span></div>
          <div class="ci-row"><span class="ci-label">最后使用</span><span class="ci-val">${lu.icon} ${lu.text}</span></div>
          <div class="ci-row"><span class="ci-label">标签</span><span class="ci-val">${t.tags.map(tg=>`<span class="tag" style="font-size:9px">${tg}</span>`).join(' ')}</span></div>
          <div class="ci-row"><span class="ci-label">描述</span><span class="ci-val" style="font-size:12px">${t.desc}</span></div>
          <div class="ci-row"><span class="ci-label">笔记</span><span class="ci-val" style="font-size:12px;line-height:1.5">${t.notes||'暂无笔记'}</span></div>
        </div>`;
      }).join('')}
    </div>
    <div class="compare-close"><button onclick="document.getElementById('compareModal').classList.remove('active')">关闭</button></div>
  `;
  document.getElementById('compareModal').classList.add('active');
}

// ===== 侧滑面板 =====
function openPanel(id) {
  currentPanelId = id;
  const t = tools.find(x => x.id === id);
  if (!t) return;
  const editable = isEditMode;
  const lu = getLastUsed(t.heatmap);
  document.getElementById('panelContent').innerHTML = `
    <div class="panel-icon">${t.icon.startsWith('http')?`<img src="${t.icon}" onerror="this.parentElement.textContent='${t.name[0]}'">`:t.icon}</div>
    <div class="panel-name">${t.name}</div>
    <div class="panel-url"><a href="${t.url}" target="_blank" style="color:var(--accent);text-decoration:none">${t.url}</a></div>
    <div class="panel-tags">${t.tags.map(tg=>`<span class="tag">${getTagLabel(tg)}</span>`).join('')}</div>
    <div class="panel-stars">
      <span class="label">RATING:</span>
      <div>${renderStars(t.rating, editable)}</div>
    </div>
    <div class="last-used ${lu.cls}" style="margin-bottom:24px">${lu.icon} ${lu.text}</div>
    ${editable ? `
    <div class="panel-section">标签管理</div>
    <div class="tag-editor">
      <div class="tag-editor-header">已有标签（点击选择/取消）</div>
      <div class="tag-editor-list" id="tagEditorList">
        ${getAllTags().map(tag => `<span class="te-tag ${t.tags.includes(tag)?'selected':''}" onclick="toggleToolTag(${t.id},'${tag}')">${getTagLabel(tag)}</span>`).join('')}
      </div>
      <div class="tag-editor-header" style="margin-top:12px">自定义标签</div>
      <div class="tag-editor-input">
        <input type="text" id="customTagInput" placeholder="输入新标签..." onkeydown="if(event.key==='Enter')addCustomTag(${t.id})">
        <button onclick="addCustomTag(${t.id})">添加</button>
      </div>
    </div>
    ` : ''}
    <div class="panel-section">使用笔记</div>
    <div class="panel-notes">
      ${editable
        ? `<textarea id="notesArea">${(t.notes||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>`
        : `<div>${t.notes||'<span style="color:var(--t3)">暂无笔记</span>'}</div>`
      }
    </div>
    ${t.draft && editable ? `
      <div class="panel-section">PUBLISH</div>
      <button class="p-btn p-btn-primary" onclick="publishDraft(${t.id})">发布工具 ↗</button>
    ` : ''}
    <div class="panel-actions">
      <a class="p-btn p-btn-primary" href="${t.url}" target="_blank">访问 →</a>
      ${editable ? `
        <button class="p-btn p-btn-secondary" onclick="saveNotes(${t.id})">保存笔记</button>
        <button class="p-btn p-btn-danger" onclick="deleteTool(${t.id})">删除</button>
      ` : ''}
    </div>
  `;
  document.getElementById('overlay').classList.add('active');
  document.getElementById('sidePanel').classList.add('active');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('sidePanel').classList.remove('active');
  currentPanelId = null;
}

// ===== 密码模态框（全局唯一入口） =====
function openPwModal() {
  if (isEditMode) { exitEditMode(); return; }
  document.getElementById('pwModal').classList.add('active');
  document.getElementById('pwModalInput').value = '';
  document.getElementById('pwModalMsg').textContent = '';
  document.getElementById('pwModalMsg').className = 'pw-modal-msg';
  setTimeout(() => document.getElementById('pwModalInput').focus(), 200);
}

function closePwModal() {
  document.getElementById('pwModal').classList.remove('active');
}

document.getElementById('pwModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePwModal();
});

async function verifyPw() {
  if (Date.now() < pwLockUntil) {
    const sec = Math.ceil((pwLockUntil - Date.now()) / 1000);
    showPwModalMsg(`LOCKED. TRY AGAIN IN ${sec}s.`, 'err');
    return;
  }
  const input = document.getElementById('pwModalInput');
  const hash = await sha256(input.value);
  const storedHash = localStorage.getItem('explorer_pw_hash') || await sha256('explorer');
  if (hash === storedHash) {
    closePwModal();
    enterEditMode();
    showToast('编辑模式已开启 — 双击卡片可收藏，点击可编辑笔记和评分','success');
  } else {
    pwFailCount++;
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    if (pwFailCount >= 3) {
      pwLockUntil = Date.now() + 30000;
      pwFailCount = 0;
      showPwModalMsg('TOO MANY ATTEMPTS. LOCKED FOR 30S.', 'err');
    } else {
      showPwModalMsg(`ACCESS_DENIED. ${3-pwFailCount} ATTEMPTS LEFT.`, 'err');
    }
  }
  input.value = '';
}

function showPwModalMsg(msg, cls) {
  const el = document.getElementById('pwModalMsg');
  el.textContent = msg;
  el.className = 'pw-modal-msg ' + cls;
}

// ===== 快速添加按钮处理 =====
function handleQuickAdd() {
  if (!isEditMode) {
    openPwModal();
    showToast('粘贴或拖拽网址以添加新工具','info');
  } else {
    openAddModal();
  }
}

// ===== 弹出式添加卡片 =====
let pendingTool = null;

function openAddModal() {
  document.getElementById('addModal').classList.add('active');
  document.getElementById('addUrlInput').value = '';
  document.getElementById('addPreview').style.display = 'none';
  document.getElementById('addConfirmBtn').disabled = true;
  pendingTool = null;
  setTimeout(() => document.getElementById('addUrlInput').focus(), 200);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
  pendingTool = null;
}

function confirmAddTool() {
  if (!pendingTool) return;
  tools.push(pendingTool);
  save();
  renderCards();
  closeAddModal();
  showToast(`"${pendingTool.name}" 已添加到收藏！`,'success');
}

// ===== 添加卡片输入处理 =====
function setupAddModal() {
  const zone = document.getElementById('addInputZone');
  const input = document.getElementById('addUrlInput');

  input.addEventListener('input', () => {
    if (input.value.trim()) processAddUrl(input.value.trim());
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && pendingTool) confirmAddTool();
    if (e.key === 'Escape') closeAddModal();
  });

  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const text = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text/uri-list');
    if (text) {
      input.value = text.trim();
      processAddUrl(text.trim());
    }
  });
}

function processAddUrl(rawUrl) {
  let url = rawUrl;
  if (!url.startsWith('http')) url = 'https://' + url;
  let domain = '';
  try { domain = new URL(url).hostname.replace(/^www\./, ''); } catch(e) {
    document.getElementById('addPreview').style.display = 'none';
    document.getElementById('addConfirmBtn').disabled = true;
    return;
  }

  const mapped = DOMAIN_MAP[domain];
  const newId = tools.length > 0 ? Math.max(...tools.map(t => t.id)) + 1 : 1;
  
  // 获取 favicon
  const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  
  pendingTool = {
    id: newId,
    name: mapped ? mapped.name : domain.split('.')[0].charAt(0).toUpperCase() + domain.split('.')[0].slice(1),
    icon: faviconUrl,
    url: url,
    tags: mapped ? [...mapped.tags] : ['uncategorized'],
    desc: mapped ? mapped.desc : 'New tool — add description',
    rating: 0,
    notes: '',
    fav: false,
    draft: true,
    heatmap: new Array(30).fill(0)
  };

  // 显示预览
  document.getElementById('previewIcon').innerHTML = `<img src="${faviconUrl}" onerror="this.parentElement.textContent='${pendingTool.name[0]}'">`;
  document.getElementById('previewName').textContent = pendingTool.name;
  document.getElementById('previewUrl').textContent = url;
  document.getElementById('previewTags').innerHTML = pendingTool.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('addPreview').style.display = 'block';
  document.getElementById('addConfirmBtn').disabled = false;
}

// ===== 更新统计 =====
function updateStats() {
  const total = tools.length;
  const fav = tools.filter(t => t.fav).length;
  const draft = tools.filter(t => t.draft).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statFav').textContent = fav;
  document.getElementById('statDraft').textContent = draft;
}

// ===== 更新快速添加按钮状态 =====
function updateQuickAddBtn() {
  const btn = document.getElementById('quickAddBtn');
  const icon = document.getElementById('qaIcon');
  const title = document.getElementById('qaTitle');
  const desc = document.getElementById('qaDesc');
  if (isEditMode) {
    btn.classList.add('unlocked');
    icon.textContent = '✓';
    title.textContent = '就绪';
    desc.textContent = '点击添加工具';
  } else {
    btn.classList.remove('unlocked');
    icon.textContent = '＋';
    title.textContent = '添加工具';
    desc.textContent = '点击解锁后添加';
  }
}

// ===== 编辑模式 =====
function enterEditMode() {
  isEditMode = true;
  sessionStorage.setItem('explorer_edit', '1');
  document.body.classList.add('edit-active');
  document.getElementById('editBanner').classList.add('active');
  document.getElementById('navbar').classList.add('shifted');
  document.getElementById('lockBtn').classList.add('lock-active');
  document.getElementById('lockBtn').textContent = '🔓';
  document.getElementById('lockBtn').title = 'Exit Edit Mode';
  pwFailCount = 0;
  updateQuickAddBtn();
  renderCards();
}

function exitEditMode() {
  isEditMode = false;
  sessionStorage.removeItem('explorer_edit');
  document.body.classList.remove('edit-active');
  document.getElementById('editBanner').classList.remove('active');
  document.getElementById('navbar').classList.remove('shifted');
  document.getElementById('lockBtn').classList.remove('lock-active');
  document.getElementById('lockBtn').textContent = '🔒';
  document.getElementById('lockBtn').title = 'Edit Mode';
  updateQuickAddBtn();
  if (currentPanelId) closePanel();
  renderCards();
  showToast('编辑模式已关闭','info');
}

// ===== 编辑操作 =====
function setRating(id, rating) {
  if (!isEditMode) return;
  const t = tools.find(x => x.id === id);
  if (t) { t.rating = rating; save(); openPanel(id); showToast('评分已更新','success'); }
}

function saveNotes(id) {
  if (!isEditMode) return;
  const area = document.getElementById('notesArea');
  const t = tools.find(x => x.id === id);
  if (t && area) { t.notes = area.value; save(); showToast('笔记已保存','success'); }
}

function deleteTool(id) {
  if (!isEditMode) return;
  if (!confirm('Delete this tool?')) return;
  tools = tools.filter(x => x.id !== id);
  save(); closePanel(); renderCards();
  showToast('工具已删除','info');
}

function publishDraft(id) {
  if (!isEditMode) return;
  const t = tools.find(x => x.id === id);
  if (t) { t.draft = false; save(); closePanel(); renderCards(); showToast('工具已发布','success'); }
}

// ===== 标签操作 =====
function toggleToolTag(id, tag) {
  if (!isEditMode) return;
  const t = tools.find(x => x.id === id);
  if (!t) return;
  const idx = t.tags.indexOf(tag);
  if (idx > -1) t.tags.splice(idx, 1);
  else t.tags.push(tag);
  save();
  openPanel(id); // 刷新面板
  renderCards();
}

function addCustomTag(id) {
  if (!isEditMode) return;
  const input = document.getElementById('customTagInput');
  const tag = input.value.trim();
  if (!tag) return;
  const t = tools.find(x => x.id === id);
  if (!t) return;
  // 添加到工具
  if (!t.tags.includes(tag)) t.tags.push(tag);
  // 添加到全局自定义标签
  if (!getAllTags().includes(tag)) {
    customTags.push(tag);
    localStorage.setItem('explorer_custom_tags', JSON.stringify(customTags));
    refreshFilterPills();
  }
  input.value = '';
  save();
  openPanel(id);
  renderCards();
  showToast(`标签「${tag}」已添加`,'success');
}

function refreshFilterPills() {
  const bar = document.getElementById('filterPills');
  const existing = new Set();
  bar.querySelectorAll('.pill').forEach(p => existing.add(p.dataset.filter));
  getAllTags().forEach(tag => {
    if (!existing.has(tag)) {
      const btn = document.createElement('button');
      btn.className = 'pill';
      btn.dataset.filter = tag;
      btn.textContent = getTagLabel(tag);
      bar.appendChild(btn);
    }
  });
}

// ===== 黑白主题切换（默认白色） =====
let isLightTheme = localStorage.getItem('explorer_theme') !== 'dark';
function toggleTheme() {
  isLightTheme = !isLightTheme;
  document.body.classList.toggle('light-theme', isLightTheme);
  document.getElementById('themeToggle').textContent = isLightTheme ? '☾' : '☀';
  localStorage.setItem('explorer_theme', isLightTheme ? 'light' : 'dark');
}
// 恢复主题
if (isLightTheme) {
  document.body.classList.add('light-theme');
  document.getElementById('themeToggle').textContent = '☾';
}

// ===== 隐藏彩蛋 =====
document.getElementById('logoBtn').addEventListener('click', e => {
  e.preventDefault();
  logoClicks++;
  document.getElementById('logoBadge').classList.add('shake');
  setTimeout(() => document.getElementById('logoBadge').classList.remove('shake'), 400);
  clearTimeout(logoClickTimer);
  logoClickTimer = setTimeout(() => { logoClicks = 0; }, 2000);
  if (logoClicks >= 5) {
    logoClicks = 0;
    triggerSupernova();
  }
});

const QUOTES = [
  '"The only way to discover the limits of the possible is to go beyond them into the impossible." — Arthur C. Clarke',
  '"In the middle of difficulty lies opportunity." — Albert Einstein',
  '"That tree is like some people. It grows best in the dark."',
  '"The future belongs to those who learn more tools and combine them in creative ways." — Robert Greene',
  '"Any sufficiently advanced technology is indistinguishable from magic." — Arthur C. Clarke',
  '"Logic is the beginning of wisdom, not the end." — Spock',
  '"To boldly go where no one has gone before." — Star Trek',
  '"I don\'t believe in the no-win scenario." — James T. Kirk',
];

function triggerSupernova() {
  const container = document.getElementById('supernova');
  container.innerHTML = '';
  container.classList.add('boom');
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'nova-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 200 + Math.random() * 400;
    const size = 4 + Math.random() * 8;
    const colors = ['var(--accent)','var(--gold)','var(--blue)','#fff','var(--green)'];
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-duration:${1+Math.random()}s;animation-delay:${Math.random()*0.3}s`;
    container.appendChild(p);
  }
  const quote = document.getElementById('novaQuote');
  quote.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  setTimeout(() => quote.classList.add('show'), 300);
  setTimeout(() => {
    quote.classList.remove('show');
    container.classList.remove('boom');
  }, 4000);
}

// ===== Toast =====
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== 恢复编辑模式 =====
if (sessionStorage.getItem('explorer_edit') === '1') {
  enterEditMode();
}

// ===== 启动 =====
init();
</script>
